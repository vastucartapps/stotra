  <text x='600' y='260' text-anchor='middle' font-family='Georgia,serif' font-size='72' font-weight='bold' fill='#FFFFFF'>Stotra</text>
  <text x='600' y='330' text-anchor='middle' font-family='Arial,sans-serif' font-size='18' fill='#DAA520' letter-spacing='6'>BY VASTUCART</text>
  <text x='600' y='380' text-anchor='middle' font-family='Arial,sans-serif' font-size='22' fill='rgba(255,255,255,0.7)'>Sacred Hindu Prayers &amp; Hymns</text>
