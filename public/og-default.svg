      <stop offset='0%' style='stop-color:#013F47'/>
      <stop offset='100%' style='stop-color:#012830'/>
    </linearGradient>
    <linearGradient id='gold' x1='0%' y1='0%' x2='100%' y2='0%'>
      <stop offset='0%' style='stop-color:#DAA520'/>
      <stop offset='100%' style='stop-color:#FF9933'/>
    </linearGradient>
  </defs>
  <rect width='1200' height='630' fill='url(#bg)'/>
  <!-- Diamond pattern -->
  <pattern id='diamonds' width='60' height='60' patternUnits='userSpaceOnUse'>
