<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Trishul (Trident) - central, dominant -->
  <!-- Main shaft -->
  <line x1="32" y1="62" x2="32" y2="18"/>
  <!-- Cross guard / ferrule at bottom -->
  <line x1="28" y1="56" x2="36" y2="56"/>
  <!-- Damaru (drum) tied to shaft -->
  <path d="M26 44 Q28 42 28 46 Q30 44 32 44 Q34 44 36 46 Q36 42 38 44"/>
  <line x1="26" y1="44" x2="28" y2="46"/>
  <line x1="36" y1="46" x2="38" y2="44"/>

  <!-- Three prongs of trishul -->
  <!-- Center prong (tallest) -->
  <path d="M32 18 L30 10 Q32 6 34 10 L32 18"/>
  <!-- Left prong -->
  <path d="M32 22 L26 16 Q24 12 27 14 L32 22"/>
  <!-- Right prong -->
  <path d="M32 22 L38 16 Q40 12 37 14 L32 22"/>
  <!-- Connecting arc at base of prongs -->
  <path d="M27 20 Q32 24 37 20"/>

  <!-- Dog silhouette (Bhairava's vahana) - lower left -->
  <!-- Dog body -->
  <ellipse cx="12" cy="54" rx="8" ry="4" transform="rotate(-10 12 54)"/>
  <!-- Dog head -->
  <circle cx="18" cy="49" r="4"/>
  <!-- Snout -->
  <path d="M20 50 Q23 50 24 52 Q22 53 20 52"/>
  <!-- Ear -->
  <path d="M15 46 Q14 43 17 44 Q18 46 16 48"/>
  <!-- Eye -->
  <circle cx="20" cy="48" r="0.8" fill="currentColor"/>
  <!-- Tail -->
  <path d="M4 52 Q2 48 5 46 Q8 47 8 51"/>
  <!-- Dog legs -->
  <line x1="10" y1="57" x2="9" y2="62"/>
  <line x1="13" y1="58" x2="13" y2="62"/>
  <line x1="16" y1="57" x2="17" y2="62"/>

  <!-- Serpent coiled around trishul shaft -->
  <path d="M30 30 Q27 32 29 36 Q33 38 35 34 Q37 30 34 28 Q31 26 30 30"/>
  <!-- Snake head -->
  <path d="M35 34 Q38 34 39 32 Q38 30 36 30"/>
  <!-- Snake tongue -->
  <path d="M39 32 L41 31 M39 32 L41 33"/>

  <!-- Third eye on trishul top (subtle) -->
  <ellipse cx="32" cy="8" rx="2" ry="1" transform="rotate(-5 32 8)"/>
  <circle cx="32" cy="8" r="0.6" fill="currentColor"/>
</svg>
