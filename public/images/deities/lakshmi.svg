<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hand above lotus (abhaya/varada mudra) -->
  <!-- Palm outline -->
  <path d="M26 6 Q24 5 23 7 Q22 10 23 12 Q24 14 26 14 L38 14 Q40 14 41 12 Q42 10 41 7 Q40 5 38 6"/>
  <!-- Fingers on hand -->
  <path d="M26 6 L26 3 Q27 2 28 3 L28 6"/>
  <path d="M29 6 L29 2 Q30 1 31 2 L31 6"/>
  <path d="M32 6 L32 2 Q33 1 34 2 L34 6"/>
  <path d="M35 6 L35 3 Q36 2 37 3 L37 6"/>
  <!-- Thumb -->
  <path d="M38 8 Q41 7 42 9 Q42 11 40 12"/>

  <!-- Coins/droplets falling from hand -->
  <ellipse cx="27" cy="18" rx="2" ry="1.2"/>
  <ellipse cx="32" cy="20" rx="2" ry="1.2"/>
  <ellipse cx="37" cy="18" rx="2" ry="1.2"/>
  <ellipse cx="24" cy="22" rx="1.5" ry="1"/>
  <ellipse cx="40" cy="22" rx="1.5" ry="1"/>
  <ellipse cx="30" cy="25" rx="1.5" ry="1"/>
  <ellipse cx="34" cy="26" rx="1.2" ry="0.8"/>

  <!-- Lotus stem -->
  <line x1="32" y1="58" x2="32" y2="34"/>
  <!-- Leaf -->
  <path d="M32 48 Q26 44 22 46 Q24 50 32 48"/>
  <path d="M32 48 Q38 44 42 46 Q40 50 32 48"/>

  <!-- Lotus flower - large 8 petals blooming -->
  <!-- Inner petals -->
  <path d="M32 34 Q28 30 26 32 Q26 36 32 38 Q38 36 38 32 Q36 30 32 34"/>
  <!-- Outer petals layer 1 -->
  <path d="M32 34 Q32 28 29 26 Q26 28 28 32"/>
  <path d="M32 34 Q38 30 40 28 Q38 26 36 28"/>
  <path d="M32 34 Q36 40 38 42 Q40 40 39 37"/>
  <path d="M32 34 Q26 40 24 42 Q22 40 25 37"/>
  <!-- Outer petals layer 2 -->
  <path d="M32 34 Q28 26 24 25 Q23 28 26 30"/>
  <path d="M32 34 Q36 26 40 25 Q41 28 38 30"/>
  <path d="M32 34 Q24 38 22 42 Q24 44 26 42"/>
  <path d="M32 34 Q40 38 42 42 Q40 44 38 42"/>

  <!-- Lotus center -->
  <circle cx="32" cy="34" r="3"/>
  <!-- Stamens -->
  <circle cx="31" cy="33" r="0.5" fill="currentColor"/>
  <circle cx="33" cy="33" r="0.5" fill="currentColor"/>
  <circle cx="32" cy="35" r="0.5" fill="currentColor"/>

  <!-- Water ripple at base -->
  <path d="M20 58 Q26 55 32 58 Q38 61 44 58"/>
  <path d="M22 61 Q27 58 32 61 Q37 64 42 61"/>
</svg>
