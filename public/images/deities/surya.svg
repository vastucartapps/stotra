<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer sun circle -->
  <circle cx="32" cy="30" r="10"/>
  <!-- Inner circle / chariot wheel hub -->
  <circle cx="32" cy="30" r="4"/>
  <!-- Wheel spokes (8 spokes) -->
  <line x1="32" y1="26" x2="32" y2="20"/>
  <line x1="35.8" y1="26.4" x2="38.9" y2="21.1"/>
  <line x1="36" y1="30" x2="42" y2="30"/>
  <line x1="35.8" y1="33.6" x2="38.9" y2="38.9"/>
  <line x1="32" y1="34" x2="32" y2="40"/>
  <line x1="28.2" y1="33.6" x2="25.1" y2="38.9"/>
  <line x1="28" y1="30" x2="22" y2="30"/>
  <line x1="28.2" y1="26.4" x2="25.1" y2="21.1"/>
  <!-- Long sun rays (8 primary rays extending outward) -->
  <line x1="32" y1="18" x2="32" y2="8"/>
  <line x1="39.1" y1="20.9" x2="45.5" y2="14.5"/>
  <line x1="42" y1="30" x2="54" y2="30"/>
  <line x1="39.1" y1="39.1" x2="45.5" y2="49.5"/>
  <line x1="32" y1="42" x2="32" y2="52"/>
  <line x1="24.9" y1="39.1" x2="18.5" y2="49.5"/>
  <line x1="22" y1="30" x2="10" y2="30"/>
  <line x1="24.9" y1="20.9" x2="18.5" y2="14.5"/>
  <!-- Short rays (between primary rays) -->
  <line x1="36.4" y1="18.7" x2="38.7" y2="13.3"/>
  <line x1="41.3" y1="25.6" x2="47.5" y2="22.5"/>
  <line x1="41.3" y1="34.4" x2="47.5" y2="37.5"/>
  <line x1="36.4" y1="41.3" x2="38.7" y2="47.5"/>
  <line x1="27.6" y1="41.3" x2="25.3" y2="47.5"/>
  <line x1="22.7" y1="34.4" x2="16.5" y2="37.5"/>
  <line x1="22.7" y1="25.6" x2="16.5" y2="22.5"/>
  <line x1="27.6" y1="18.7" x2="25.3" y2="13.3"/>
  <!-- Chariot wheel outer rim (decorative circle around wheel) -->
  <circle cx="32" cy="30" r="7" stroke-width="1" stroke-dasharray="2 1.5"/>
</svg>
