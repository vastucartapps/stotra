<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Veena body (resonating gourd - bottom) -->
  <ellipse cx="20" cy="52" rx="7" ry="5.5"/>
  <!-- Veena neck (long curved stick) -->
  <path d="M20 46.5 C20 38 22 28 24 18 C25 13 26 10 28 8"/>
  <!-- Veena upper gourd (smaller, at top) -->
  <ellipse cx="29" cy="7" rx="4" ry="3" transform="rotate(-15 29 7)"/>
  <!-- Veena tuning pegs -->
  <line x1="26" y1="9" x2="23" y2="7"/>
  <line x1="28" y1="8" x2="25" y2="6"/>
  <line x1="30" y1="7" x2="27" y2="5"/>
  <!-- Veena strings (from top gourd to bottom gourd) -->
  <path d="M27 10 C24 22 21 34 20 46" stroke-width="1"/>
  <path d="M28 10 C26 22 23 34 21 46" stroke-width="1"/>
  <path d="M29 10 C28 22 26 34 22 46" stroke-width="1"/>
  <!-- Veena bridge/frets -->
  <line x1="22" y1="30" x2="28" y2="29"/>
  <line x1="21" y1="36" x2="26" y2="35"/>
  <line x1="20" y1="42" x2="24" y2="41"/>
  <!-- Book / Pustaka (right side) -->
  <rect x="38" y="22" width="16" height="21" rx="1"/>
  <!-- Book spine -->
  <line x1="46" y1="22" x2="46" y2="43"/>
  <!-- Book pages lines -->
  <line x1="39" y1="28" x2="45" y2="28"/>
  <line x1="39" y1="32" x2="45" y2="32"/>
  <line x1="39" y1="36" x2="45" y2="36"/>
  <line x1="47" y1="28" x2="53" y2="28"/>
  <line x1="47" y1="32" x2="53" y2="32"/>
  <line x1="47" y1="36" x2="53" y2="36"/>
  <!-- Book binding ribbon -->
  <path d="M37 33 C35 31 35 35 37 33"/>
  <!-- Lotus stem connecting elements (decorative) -->
  <path d="M32 50 C32 48 33 46 34 44" stroke-width="1"/>
  <path d="M34 44 C35 42 36 41 38 42"/>
  <!-- Small lotus bloom -->
  <path d="M34 44 C33 42 34 40 36 41"/>
  <path d="M34 44 C35 42 37 41 37 43"/>
  <!-- Om symbol (small, decorative) -->
  <path d="M30 56 C28 55 27 53 28 52 C29 51 31 51 32 52 C33 53 33 55 32 56 C31 57 30 58 31 59 C32 60 33 59 33 58" stroke-width="1.2"/>
  <path d="M28 57 L26 58" stroke-width="1.2"/>
  <line x1="26" y1="55" x2="33" y2="55" stroke-width="1"/>
</svg>
