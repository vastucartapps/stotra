  <path d="M28 16 Q26 14 25 16 Q24 20 26 22 L28 20"/>

  <!-- Trishul right prong -->
  <path d="M36 16 Q38 14 39 16 Q40 20 38 22 L36 20"/>

  <!-- Cross bar at prong base -->
  <line x1="26" y1="22" x2="38" y2="22"/>

  <!-- Damaru drum hanging from left of shaft -->
  <!-- Damaru top half -->
  <path d="M20 30 Q18 28 17 30 Q17 34 20 36"/>
  <!-- Damaru bottom half -->
  <path d="M20 36 Q18 38 17 40 Q17 44 20 42"/>
  <!-- Damaru center knot -->
