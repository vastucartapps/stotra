  <circle cx="32" cy="44" r="1"/>
  <circle cx="32" cy="48" r="1"/>
  <circle cx="32" cy="52" r="1"/>

  <!-- Small snake coil near top (Vasuki) -->
  <path d="M36 25 Q40 23 42 26 Q43 29 40 30 Q38 30 37 28"/>
  <!-- Snake head -->
