  <line x1="18" y1="42" x2="10" y2="42" />
  <line x1="46" y1="42" x2="54" y2="42" />

  <!-- Banyan Leaf (Vat leaf) representing Vat Savitri -->
  <!-- Main leaf body -->
  <path d="M32 54 C20 48 14 36 20 26 C24 20 30 18 32 22 C34 18 40 20 44 26 C50 36 44 48 32 54 Z" />
  <!-- Center vein -->
  <path d="M32 22 C32 32 32 42 32 54" />
