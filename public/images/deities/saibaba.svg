  <!-- Face features -->
  <!-- Eyes (gentle, slightly closed) -->
  <path d="M28.5 17 Q30 15.5 31.5 17"/>
  <path d="M32.5 17 Q34 15.5 35.5 17"/>
  <!-- Nose -->
  <path d="M31 18 Q32 20 33 18"/>
  <!-- Gentle smile -->
  <path d="M29 21 Q32 23 35 21"/>
