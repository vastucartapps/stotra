<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- 9 planets in 3x3 grid -->
  <!-- Row 1: Surya(Sun), Chandra(Moon), Mangala(Mars) -->
  <!-- Sun (center top) - with rays -->
  <circle cx="16" cy="14" r="5"/>
  <line x1="16" y1="7" x2="16" y2="5"/>
  <line x1="21" y1="9" x2="22.5" y2="7.5"/>
  <line x1="23" y1="14" x2="25" y2="14"/>
  <line x1="21" y1="19" x2="22.5" y2="20.5"/>
  <line x1="16" y1="21" x2="16" y2="23"/>
  <line x1="11" y1="19" x2="9.5" y2="20.5"/>
  <line x1="9" y1="14" x2="7" y2="14"/>
  <line x1="11" y1="9" x2="9.5" y2="7.5"/>
  <!-- Moon (crescent) -->
  <path d="M32 9 C29 10 27 13 28 16 C29 19 32 21 35 20 C32 22 28 21 26 18 C24 15 25 11 28 9 C29.3 8 31 8 32 9Z"/>
  <!-- Mars (circle with upward arrow) -->
  <circle cx="48" cy="14" r="4.5"/>
  <line x1="51.2" y1="10.8" x2="54" y2="8"/>
  <line x1="54" y1="8" x2="54" y2="11"/>
  <line x1="54" y1="8" x2="51" y2="8"/>
  <!-- Row 2: Budha(Mercury), Guru(Jupiter), Shukra(Venus) -->
  <!-- Mercury (circle with small wings) -->
  <circle cx="16" cy="32" r="4.5"/>
  <path d="M13 28 C14 26 18 26 19 28"/>
  <path d="M13 27 C14 25 18 25 19 27" stroke-width="1"/>
  <line x1="16" y1="36.5" x2="16" y2="39"/>
  <line x1="14" y1="38" x2="18" y2="38"/>
  <!-- Jupiter (large circle with band) -->
  <circle cx="32" cy="32" r="6"/>
  <path d="M26 32 C28 30 36 30 38 32" stroke-width="1"/>
  <path d="M26 33.5 C28 35.5 36 35.5 38 33.5" stroke-width="1"/>
  <!-- Venus (circle with cross below) -->
  <circle cx="48" cy="32" r="4.5"/>
  <line x1="48" y1="36.5" x2="48" y2="40"/>
  <line x1="45" y1="38.5" x2="51" y2="38.5"/>
  <!-- Row 3: Shani(Saturn), Rahu(North Node), Ketu(South Node) -->
  <!-- Saturn (circle with ring) -->
  <circle cx="16" cy="50" r="4.5"/>
  <ellipse cx="16" cy="50" rx="8" ry="2.5" transform="rotate(-15 16 50)" stroke-width="1"/>
  <!-- Rahu (ascending node - serpent head/circle with ascending line) -->
  <circle cx="32" cy="50" r="4"/>
  <path d="M32 46 L32 42 C32 41 33 40 34 41 C34 42 33 43 32 43"/>
  <path d="M32 54 C30 55 29 57 30 58" stroke-width="1"/>
  <!-- Ketu (descending node - circle with flame tail) -->
  <circle cx="48" cy="50" r="4"/>
  <path d="M48 54 C47 56 46 58 47 59 C48 60 49 59 48 58 C47 57 46 56 48 54"/>
  <!-- Connecting lines between all planets (grid connections) -->
  <line x1="21" y1="14" x2="27" y2="14" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <line x1="37" y1="14" x2="43.5" y2="14" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <line x1="20.5" y1="32" x2="26" y2="32" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <line x1="38" y1="32" x2="43.5" y2="32" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <line x1="20.5" y1="50" x2="28" y2="50" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <line x1="36" y1="50" x2="44" y2="50" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <line x1="16" y1="19" x2="16" y2="27.5" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <line x1="32" y1="21" x2="32" y2="26" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <line x1="48" y1="19" x2="48" y2="27.5" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <line x1="16" y1="36.5" x2="16" y2="45.5" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <line x1="32" y1="38" x2="32" y2="46" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <line x1="48" y1="36.5" x2="48" y2="45.5" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <!-- Diagonal connections -->
  <line x1="20" y1="17" x2="28" y2="28" stroke-width="0.6" stroke-dasharray="1.5 2"/>
  <line x1="36" y1="28" x2="44" y2="17" stroke-width="0.6" stroke-dasharray="1.5 2"/>
  <line x1="20" y1="35" x2="28" y2="46" stroke-width="0.6" stroke-dasharray="1.5 2"/>
  <line x1="36" y1="46" x2="44" y2="35" stroke-width="0.6" stroke-dasharray="1.5 2"/>
</svg>
