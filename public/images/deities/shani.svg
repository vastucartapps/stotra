<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Saturn planet body -->
  <circle cx="32" cy="36" r="11"/>
  <!-- Saturn ring (ellipse tilted) -->
  <ellipse cx="32" cy="36" rx="20" ry="7" transform="rotate(-20 32 36)"/>
  <!-- Inner ring detail -->
  <ellipse cx="32" cy="36" rx="15" ry="5" transform="rotate(-20 32 36)" stroke-width="1"/>
  <!-- Crow body (perched on top of planet) -->
  <ellipse cx="32" cy="19" rx="5" ry="3.5"/>
  <!-- Crow head -->
  <circle cx="36" cy="17" r="2.5"/>
  <!-- Crow beak -->
  <path d="M37.8 16.5 L40 15.5 L38 17" stroke-width="1.2"/>
  <!-- Crow eye -->
  <circle cx="36.8" cy="16.5" r="0.6" stroke-width="1"/>
  <!-- Crow tail feathers -->
  <path d="M27 20 C25 22 23 23 22 22"/>
  <path d="M27 21 C26 24 24 25 23 25"/>
  <!-- Crow wing suggestion -->
  <path d="M31 18 C30 15 28 14 27 15 C29 16 30 17 31 19"/>
  <path d="M33 18 C34 15 36 14 37 15" stroke-width="1"/>
  <!-- Crow leg connecting to planet -->
  <line x1="32" y1="22.5" x2="32" y2="25"/>
  <line x1="33" y1="22.5" x2="33.5" y2="25"/>
  <!-- Karma scales symbol (small, below) -->
  <line x1="32" y1="50" x2="32" y2="56"/>
  <line x1="26" y1="52" x2="38" y2="52"/>
  <!-- Scale pans -->
  <path d="M26 52 C25 53 24 54 23 54 C22 54 21 53 20 52"/>
  <path d="M38 52 C39 53 40 54 41 54 C42 54 43 53 44 52"/>
  <!-- Trident / staff base -->
  <line x1="32" y1="52" x2="32" y2="58"/>
</svg>
