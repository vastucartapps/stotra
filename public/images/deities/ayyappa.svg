<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Tiger face (Ayyappa's vahana/mount) -->
  <!-- Tiger head outline -->
  <path d="M16 30 Q14 22 18 16 Q24 10 32 10 Q40 10 46 16 Q50 22 48 30 Q46 38 40 42 Q36 44 32 44 Q28 44 24 42 Q18 38 16 30"/>

  <!-- Tiger ears -->
  <path d="M20 14 L18 8 L24 12"/>
  <path d="M44 14 L46 8 L40 12"/>
  <!-- Inner ear -->
  <path d="M20 13 L19 9 L23 12"/>
  <path d="M44 13 L45 9 L41 12"/>

  <!-- Tiger eyes (fierce, open) -->
  <ellipse cx="25" cy="24" rx="3.5" ry="2.5"/>
  <ellipse cx="39" cy="24" rx="3.5" ry="2.5"/>
  <!-- Pupils -->
  <ellipse cx="25" cy="24" rx="1.5" ry="2"/>
  <ellipse cx="39" cy="24" rx="1.5" ry="2"/>
  <!-- Eye shine dots -->
  <circle cx="26" cy="23" r="0.5" fill="currentColor"/>
  <circle cx="40" cy="23" r="0.5" fill="currentColor"/>

  <!-- Nose -->
  <path d="M29 30 Q32 28 35 30 Q33 33 32 32 Q31 33 29 30"/>
  <!-- Nostrils -->
  <circle cx="30" cy="30" r="0.8"/>
  <circle cx="34" cy="30" r="0.8"/>

  <!-- Mouth / muzzle area -->
  <path d="M28 34 Q30 36 32 35 Q34 36 36 34"/>
  <!-- Whisker lines -->
  <line x1="18" y1="28" x2="26" y2="30"/>
  <line x1="18" y1="31" x2="26" y2="32"/>
  <line x1="18" y1="34" x2="26" y2="33"/>
  <line x1="46" y1="28" x2="38" y2="30"/>
  <line x1="46" y1="31" x2="38" y2="32"/>
  <line x1="46" y1="34" x2="38" y2="33"/>

  <!-- Tiger stripes on forehead -->
  <path d="M26 16 Q28 14 30 16"/>
  <path d="M34 16 Q36 14 38 16"/>
  <path d="M30 13 Q32 11 34 13"/>

  <!-- Temple bell (Ayyappa's iconic bell) above -->
  <!-- Bell -->
  <path d="M28 4 Q28 2 32 2 Q36 2 36 4 L38 8 Q36 10 32 10 Q28 10 26 8 Z"/>
  <!-- Bell clapper -->
  <line x1="32" y1="8" x2="32" y2="10"/>
  <circle cx="32" cy="10" r="1"/>
  <!-- Bell hanging string -->
  <line x1="32" y1="2" x2="32" y2="1"/>

  <!-- Arrow pointing upward (spiritual ascent) -->
  <line x1="56" y1="52" x2="56" y2="14"/>
  <path d="M53 20 L56 14 L59 20"/>
  <!-- Arrow tail fletching -->
  <path d="M54 48 L52 52 M58 48 L60 52"/>

  <!-- Decorative base with lotus seat -->
  <path d="M20 56 Q22 52 26 52 Q29 52 32 50 Q35 52 38 52 Q42 52 44 56"/>
  <path d="M18 58 Q22 55 26 55 Q30 54 32 53 Q34 54 38 55 Q42 55 46 58"/>
</svg>
