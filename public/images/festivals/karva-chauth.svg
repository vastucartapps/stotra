<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Chalni (sieve) - circular with mesh pattern -->
  <!-- Outer ring -->
  <circle cx="22" cy="28" r="16"/>
  <!-- Sieve handle -->
  <path d="M36 32 L44 36"/>
  <path d="M36 24 L44 20"/>
  <rect x="36" y="23" width="8" height="10" rx="2"/>
  <!-- Sieve mesh pattern (grid) -->
  <line x1="8" y1="22" x2="36" y2="22"/>
  <line x1="7" y1="26" x2="37" y2="26"/>
  <line x1="6" y1="30" x2="37" y2="30"/>
  <line x1="7" y1="34" x2="36" y2="34"/>
  <line x1="14" y1="13" x2="14" y2="43"/>
  <line x1="18" y1="12" x2="18" y2="44"/>
  <line x1="22" y1="12" x2="22" y2="44"/>
  <line x1="26" y1="12" x2="26" y2="44"/>
  <line x1="30" y1="13" x2="30" y2="43"/>
  <!-- Moon visible through sieve (crescent) -->
  <path d="M18 26 Q19 22 22 22 Q25 22 26 26 Q24 24 22 24 Q20 24 18 26Z"/>
  <!-- Moon crescent detail -->
  <path d="M19 28 Q20 26 22 25"/>
  <!-- Karva (earthen pot) beside sieve -->
  <!-- Karva body -->
  <path d="M46 38 Q42 36 42 44 Q42 54 46 56 Q52 58 56 54 Q60 50 58 44 Q58 38 54 38 Z"/>
  <!-- Karva neck -->
  <path d="M46 38 Q50 36 54 38"/>
  <!-- Karva spout -->
  <path d="M54 40 Q58 38 60 40 Q60 42 58 42"/>
  <!-- Karva opening/mouth -->
  <ellipse cx="50" cy="36" rx="4" ry="2"/>
  <!-- Karva lid -->
  <path d="M47 36 Q50 34 53 36"/>
  <!-- Karva decoration -->
  <path d="M44 44 Q50 46 56 44"/>
  <path d="M43 48 Q50 50 57 48"/>
  <!-- Dot decoration on karva -->
  <circle cx="48" cy="52" r="1" fill="currentColor" stroke="none"/>
  <circle cx="52" cy="53" r="1" fill="currentColor" stroke="none"/>
  <circle cx="56" cy="52" r="1" fill="currentColor" stroke="none"/>
  <!-- Stars around moon in sieve -->
  <path d="M10 20 L11 18 L12 20 L10 19 L12 19Z" fill="currentColor" stroke="none"/>
  <path d="M30 18 L31 16 L32 18 L30 17 L32 17Z" fill="currentColor" stroke="none"/>
</svg>
