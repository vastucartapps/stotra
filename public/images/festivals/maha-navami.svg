<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- 9-pointed star / Navami symbol -->
  <!-- Nine weapons of Durga arranged in a circle -->
  <!-- Central circle -->
  <circle cx="32" cy="32" r="8"/>
  <!-- Trishul at top (12 o'clock) -->
  <line x1="32" y1="24" x2="32" y2="12"/>
  <path d="M32 12 L30 16 M32 12 L34 16"/>
  <path d="M30 14 L28 11 L30 13 M34 14 L36 11 L34 13"/>
  <!-- Sword (2 o'clock) -->
  <line x1="38" y1="26" x2="48" y2="16"/>
  <path d="M48 16 L46 19 L50 18 Z"/>
  <path d="M38 27 L36 30"/>
  <!-- Bow (4 o'clock) -->
  <path d="M40" cy="34"/>
  <path d="M40 34 Q48 36 48 44"/>
  <line x1="40" y1="34" x2="48" y2="44"/>
  <!-- Chakra (6 o'clock) -->
  <circle cx="32" cy="50" r="5"/>
  <line x1="32" y1="45" x2="32" y2="55"/>
  <line x1="27" y1="50" x2="37" y2="50"/>
  <line x1="28.5" y1="46.5" x2="35.5" y2="53.5"/>
  <line x1="35.5" y1="46.5" x2="28.5" y2="53.5"/>
  <!-- Spear (8 o'clock) -->
  <line x1="24" y1="38" x2="14" y2="48"/>
  <path d="M14 48 L16 44 L18 48 Z"/>
  <!-- Conch (10 o'clock) -->
  <path d="M22 28 Q16 22 18 16 Q22 12 26 16 Q28 20 24 24 Q22 26 22 28"/>
  <path d="M22 28 Q20 30 22 32"/>
  <!-- Noose/pasha (1 o'clock) -->
  <path d="M38 26 Q44 18 46 20 Q48 22 44 26 Q42 28 40 28"/>
  <!-- Club/gada (5 o'clock) -->
  <line x1="38" y1="38" x2="50" y2="50"/>
  <circle cx="52" cy="52" r="3"/>
  <!-- Lotus (7 o'clock) -->
  <path d="M24 38 Q18 42 16 48"/>
  <path d="M14 50 Q16 46 20 48 Q18 52 14 50"/>
  <path d="M16 52 Q20 48 22 52 Q20 56 16 52"/>
  <!-- Nine dots around (nava = nine) -->
  <circle cx="32" cy="8" r="1.5"/>
  <circle cx="44" cy="12" r="1.5"/>
  <circle cx="52" cy="22" r="1.5"/>
  <circle cx="52" cy="36" r="1.5"/>
  <circle cx="44" cy="48" r="1.5"/>
  <circle cx="20" cy="48" r="1.5"/>
  <circle cx="12" cy="36" r="1.5"/>
  <circle cx="12" cy="22" r="1.5"/>
  <circle cx="20" cy="12" r="1.5"/>
</svg>
