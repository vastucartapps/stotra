<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Dark new moon (circle outline) -->
  <circle cx="32" cy="28" r="18"/>
  <!-- Inner shadow circle (new moon = dark) -->
  <circle cx="32" cy="28" r="14"/>
  <!-- Single diya breaking the darkness - lower center -->
  <path d="M26 52 Q24 48 24 46 Q24 42 32 42 Q40 42 40 46 Q40 48 38 52 Z"/>
  <!-- Diya spout -->
  <path d="M37 44 Q40 42 42 44"/>
  <!-- Flame - bright, prominent -->
  <path d="M40 44 Q38 39 40 34 Q42 39 40 44"/>
  <path d="M40 40 Q41 36 40 32"/>
  <!-- Light rays from diya (piercing dark) -->
  <line x1="40" y1="36" x2="44" y2="30"/>
  <line x1="40" y1="34" x2="46" y2="32"/>
  <line x1="40" y1="38" x2="46" y2="38"/>
  <!-- Ancestor / pitru dots (3 dots = pitru tarpan) -->
  <circle cx="20" cy="18" r="1.5"/>
  <circle cx="32" cy="14" r="1.5"/>
  <circle cx="44" cy="18" r="1.5"/>
  <!-- Water vessel for tarpan -->
  <path d="M14 54 Q12 51 14 49 Q18 47 22 49 Q24 51 22 54 Z"/>
  <path d="M18 49 L18 46"/>
  <!-- Kusa grass -->
  <path d="M10 54 Q11 50 12 46 Q13 50 14 54"/>
  <!-- Stars - very few (new moon night) -->
  <circle cx="12" cy="12" r="1"/>
  <circle cx="52" cy="10" r="1"/>
  <circle cx="8" cy="36" r="0.8"/>
  <circle cx="56" cy="38" r="0.8"/>
  <!-- Ground -->
  <line x1="6" y1="56" x2="58" y2="56"/>
</svg>
