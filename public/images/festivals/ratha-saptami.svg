  <line x1="32" y1="2" x2="32" y2="0"/>
  <line x1="40" y1="4" x2="42" y2="2"/>
  <line x1="44" y1="10" x2="46" y2="10"/>
  <line x1="20" y1="4" x2="18" y2="2"/>
  <line x1="16" y1="10" x2="14" y2="10"/>
