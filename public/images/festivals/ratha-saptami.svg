  <line x1="22" y1="42" x2="22" y2="58"/>
  <line x1="14" y1="50" x2="30" y2="50"/>
  <line x1="16.3" y1="44.3" x2="27.7" y2="55.7"/>
  <line x1="27.7" y1="44.3" x2="16.3" y2="55.7"/>
  <!-- Chariot wheel right -->
  <circle cx="42" cy="50" r="8"/>
  <circle cx="42" cy="50" r="4"/>
  <line x1="42" y1="42" x2="42" y2="58"/>
  <line x1="34" y1="50" x2="50" y2="50"/>
  <line x1="36.3" y1="44.3" x2="47.7" y2="55.7"/>
  <line x1="47.7" y1="44.3" x2="36.3" y2="55.7"/>
  <!-- Horses (simplified, 2 visible) -->
  <!-- Horse 1 -->
  <path d="M10 36 Q6 32 4 28 Q2 24 6 22 Q10 20 12 24 L14 32"/>
  <line x1="4" y1="40" x2="4" y2="46"/>
  <line x1="8" y1="40" x2="8" y2="46"/>
  <!-- Reins -->
  <line x1="14" y1="32" x2="8" y2="26"/>
