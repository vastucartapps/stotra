<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Tulsi plant pot -->
  <path d="M22 52 L24 58 L40 58 L42 52"/>
  <ellipse cx="32" cy="52" rx="10" ry="3"/>
  <!-- Pot decoration -->
  <path d="M24 54 Q32 56 40 54"/>
  <!-- Tulsi main stem -->
  <line x1="32" y1="52" x2="32" y2="24"/>
  <!-- Tulsi branches -->
  <path d="M32 48 Q26 44 22 38"/>
  <path d="M32 44 Q38 40 42 34"/>
  <path d="M32 40 Q26 36 23 30"/>
  <path d="M32 36 Q38 32 41 26"/>
  <path d="M32 32 Q28 28 26 24"/>
  <path d="M32 28 Q36 24 38 20"/>
  <!-- Tulsi leaves (small ovals on branches) -->
  <ellipse cx="22" cy="37" rx="3" ry="2" transform="rotate(-30 22 37)"/>
  <ellipse cx="42" cy="33" rx="3" ry="2" transform="rotate(30 42 33)"/>
  <ellipse cx="23" cy="29" rx="3" ry="2" transform="rotate(-20 23 29)"/>
  <ellipse cx="41" cy="25" rx="3" ry="2" transform="rotate(20 41 25)"/>
  <ellipse cx="26" cy="23" rx="2.5" ry="1.5" transform="rotate(-30 26 23)"/>
  <ellipse cx="38" cy="19" rx="2.5" ry="1.5" transform="rotate(30 38 19)"/>
  <!-- Tulsi tip -->
  <path d="M30 24 Q32 20 34 24"/>
  <!-- Vishnu Pada (footprint) - small footprint shape -->
  <path d="M8 34 Q6 30 8 26 Q12 24 14 28 Q14 32 10 34Z"/>
  <!-- Toe marks -->
  <circle cx="9" cy="25" r="1" fill="currentColor" stroke="none"/>
  <circle cx="11" cy="24" r="1" fill="currentColor" stroke="none"/>
  <circle cx="13" cy="25" r="1" fill="currentColor" stroke="none"/>
  <circle cx="14" cy="27" r="1" fill="currentColor" stroke="none"/>
  <!-- Prayer beads (Japa mala) -->
  <circle cx="52" cy="20" r="10" stroke-dasharray="2,2"/>
  <!-- Individual beads on mala -->
  <circle cx="52" cy="10" r="1.5"/>
  <circle cx="58" cy="14" r="1.5"/>
  <circle cx="62" cy="20" r="1.5"/>
  <circle cx="58" cy="26" r="1.5"/>
  <circle cx="52" cy="30" r="1.5"/>
  <circle cx="46" cy="26" r="1.5"/>
  <circle cx="42" cy="20" r="1.5"/>
  <circle cx="46" cy="14" r="1.5"/>
  <!-- Meru bead (larger) -->
  <circle cx="52" cy="10" r="2.5"/>
  <!-- Tassel -->
  <path d="M52 10 L50 6 M52 10 L52 5 M52 10 L54 6"/>
</svg>
