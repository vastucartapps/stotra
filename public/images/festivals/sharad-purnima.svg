<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Full bright moon - large and prominent -->
  <circle cx="32" cy="18" r="14"/>
  <!-- Moon inner glow ring -->
  <circle cx="32" cy="18" r="11" stroke-dasharray="1,2" stroke-width="1"/>
  <!-- Moon surface detail (maria/seas) -->
  <path d="M25 14 Q28 12 31 14 Q29 16 25 14Z"/>
  <path d="M34 16 Q37 14 39 17 Q37 19 34 16Z"/>
  <path d="M28 20 Q31 18 33 20 Q31 22 28 20Z"/>
  <!-- Outer moon halo (sharad purnima is special bright moon) -->
  <circle cx="32" cy="18" r="17" stroke-dasharray="2,4" stroke-width="1"/>
  <!-- Moonbeams radiating down -->
  <line x1="32" y1="32" x2="32" y2="40" stroke-dasharray="3,2"/>
  <line x1="24" y1="30" x2="20" y2="38" stroke-dasharray="2,3"/>
  <line x1="40" y1="30" x2="44" y2="38" stroke-dasharray="2,3"/>
  <line x1="18" y1="24" x2="12" y2="32" stroke-dasharray="1,4"/>
  <line x1="46" y1="24" x2="52" y2="32" stroke-dasharray="1,4"/>
  <!-- Lotus flowers below (3 lotuses) -->
  <!-- Center lotus -->
  <circle cx="32" cy="52" r="3"/>
  <!-- Center petals -->
  <path d="M32 49 Q29 46 30 44 Q32 43 34 44 Q35 46 32 49Z"/>
  <path d="M35 51 Q38 49 40 51 Q40 53 38 54 Q36 53 35 51Z"/>
  <path d="M29 51 Q26 49 24 51 Q24 53 26 54 Q28 53 29 51Z"/>
  <path d="M32 55 Q29 58 30 60 Q32 61 34 60 Q35 58 32 55Z"/>
  <!-- Center stamen -->
  <circle cx="32" cy="52" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Left lotus -->
  <circle cx="16" cy="54" r="2.5"/>
  <path d="M16 51 Q14 48 15 47 Q17 47 18 48 Q17 50 16 51Z"/>
  <path d="M19 54 Q22 52 22 54 Q22 56 19 56Z"/>
  <path d="M13 54 Q10 52 10 54 Q10 56 13 56Z"/>
  <path d="M16 57 Q15 60 16 61 Q17 60 17 57Z"/>
  <circle cx="16" cy="54" r="1" fill="currentColor" stroke="none"/>
  <!-- Right lotus -->
  <circle cx="48" cy="54" r="2.5"/>
  <path d="M48 51 Q46 48 47 47 Q49 47 50 48 Q49 50 48 51Z"/>
  <path d="M51 54 Q54 52 54 54 Q54 56 51 56Z"/>
  <path d="M45 54 Q42 52 42 54 Q42 56 45 56Z"/>
  <path d="M48 57 Q47 60 48 61 Q49 60 49 57Z"/>
  <circle cx="48" cy="54" r="1" fill="currentColor" stroke="none"/>
  <!-- Water surface with lotus stems -->
  <path d="M6 56 Q16 54 26 56 Q32 58 38 56 Q48 54 58 56"/>
  <line x1="32" y1="55" x2="32" y2="58"/>
  <line x1="16" y1="57" x2="16" y2="60"/>
  <line x1="48" y1="57" x2="48" y2="60"/>
  <!-- Stars in sky -->
  <circle cx="10" cy="10" r="1" fill="currentColor" stroke="none"/>
  <circle cx="55" cy="8" r="1" fill="currentColor" stroke="none"/>
  <circle cx="14" cy="30" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="50" cy="30" r="0.8" fill="currentColor" stroke="none"/>
</svg>
