<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Vel / Spear shaft -->
  <line x1="32" y1="58" x2="32" y2="18"/>
  <!-- Vel spearhead (diamond/leaf shape) -->
  <path d="M32 6 L28 14 L32 18 L36 14 Z"/>
  <!-- Vel middle crossguard -->
  <path d="M26 22 L38 22"/>
  <path d="M28 20 L36 20"/>
  <!-- Peacock feather left -->
  <path d="M20 30 Q14 24 10 18 Q8 14 12 12 Q16 10 18 16 Q20 22 20 30"/>
  <!-- Peacock eye on feather -->
  <ellipse cx="13" cy="16" rx="2.5" ry="3.5" transform="rotate(-30 13 16)"/>
  <circle cx="13" cy="16" r="1"/>
  <!-- Peacock feather right -->
  <path d="M44 30 Q50 24 54 18 Q56 14 52 12 Q48 10 46 16 Q44 22 44 30"/>
  <ellipse cx="51" cy="16" rx="2.5" ry="3.5" transform="rotate(30 51 16)"/>
  <circle cx="51" cy="16" r="1"/>
  <!-- Peacock body below vel -->
  <path d="M24 38 Q32 34 40 38"/>
  <path d="M28 38 Q28 44 32 46 Q36 44 36 38"/>
  <!-- Peacock head -->
  <circle cx="32" cy="36" r="3"/>
  <line x1="32" y1="33" x2="32" y2="30"/>
  <path d="M30 30 Q32 28 34 30"/>
  <!-- 6 Krittika stars arranged in hexagonal pattern -->
  <circle cx="12" cy="8" r="1.5"/>
  <circle cx="20" cy="6" r="1.5"/>
  <circle cx="28" cy="8" r="1.5"/>
  <circle cx="36" cy="6" r="1.5"/>
  <circle cx="44" cy="8" r="1.5"/>
  <circle cx="52" cy="6" r="1.5"/>
  <!-- Stars connected loosely -->
  <path d="M12 8 Q20 6 28 8 Q36 6 44 8 Q52 6 52 6" stroke-dasharray="2 2"/>
  <!-- Ground -->
  <line x1="8" y1="58" x2="56" y2="58"/>
</svg>
