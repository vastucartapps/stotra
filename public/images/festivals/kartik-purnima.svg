  <path d="M42 35 L43 33"/>
  <path d="M43 33 C42 31 41 30 42 28 C43 29 44 31 43 33Z"/>
  <!-- Diya 5 (right) -->
  <path d="M48 38 Q46 40 48 41 Q52 42 54 40 Q54 38 52 37Z"/>
  <path d="M52 37 L53 35"/>
  <path d="M53 35 C52 33 51 32 52 30 C53 31 54 33 53 35Z"/>
