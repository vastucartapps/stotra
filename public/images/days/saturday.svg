<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Saturn planet body -->
  <circle cx="32" cy="22" r="10" />
  <!-- Saturn rings (elliptical, tilted) -->
  <ellipse cx="32" cy="22" rx="18" ry="5" />
  <!-- Ring occlusion lines to suggest 3D -->
  <path d="M22 20 Q32 23 42 20" stroke-dasharray="2,2" />
  <!-- Oil lamp (til ka diya) at bottom center -->
  <!-- Lamp plate/diya -->
  <path d="M24 50 Q32 48 40 50 Q38 54 32 55 Q26 54 24 50Z" />
  <!-- Lamp spout -->
  <path d="M38 50 Q42 49 43 51 Q41 52 38 51" />
  <!-- Flame -->
  <path d="M39 50 Q38 47 40 45 Q41 47 42 45 Q43 47 42 50" />
  <!-- Flame glow -->
  <line x1="40" y1="44" x2="40" y2="42" />
  <line x1="37" y1="45" x2="36" y2="43" />
  <line x1="43" y1="45" x2="44" y2="43" />
  <!-- Oil drops in lamp -->
  <path d="M28 52 Q32 51 36 52" />
  <!-- Crow perched on left (Shani's vahana) -->
  <!-- Crow body -->
  <ellipse cx="14" cy="44" rx="5" ry="3.5" />
  <!-- Crow head -->
  <circle cx="19" cy="41" r="3" />
  <!-- Crow beak -->
  <path d="M21 41 L24 40 L21 42 Z" />
  <!-- Crow eye -->
  <circle cx="20" cy="40.5" r="0.8" />
  <!-- Crow tail feathers -->
  <path d="M9 44 L6 42 M9 45 L5 45 M9 46 L6 48" />
  <!-- Crow legs -->
  <line x1="13" y1="47" x2="12" y2="51" />
  <line x1="16" y1="47" x2="17" y2="51" />
  <path d="M10 51 L12 51 L14 51" />
  <path d="M15 51 L17 51 L19 51" />
  <!-- Crow wing hint -->
  <path d="M11 43 Q13 40 17 43" />
  <!-- Sesame seeds (til) scattered near lamp -->
  <circle cx="28" cy="58" r="1" />
  <circle cx="32" cy="59" r="1" />
  <circle cx="36" cy="58" r="1" />
  <circle cx="44" cy="58" r="1" />
  <circle cx="48" cy="56" r="1" />
  <!-- Saturn's karmic lines / shadow rays downward -->
  <line x1="28" y1="32" x2="26" y2="38" stroke-dasharray="2,2" />
  <line x1="36" y1="32" x2="38" y2="38" stroke-dasharray="2,2" />
</svg>
