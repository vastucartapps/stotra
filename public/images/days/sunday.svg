<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Chariot wheel center (12-spoke dharma chakra style) -->
  <circle cx="32" cy="32" r="10" />
  <!-- Hub circle -->
  <circle cx="32" cy="32" r="3" />
  <!-- 12 spokes of the wheel -->
  <line x1="32" y1="29" x2="32" y2="22" />
  <line x1="34.6" y1="29.7" x2="38.2" y2="23.8" />
  <line x1="35.7" y1="32" x2="42" y2="32" />
  <line x1="34.6" y1="34.3" x2="38.2" y2="40.2" />
  <line x1="32" y1="35" x2="32" y2="42" />
  <line x1="29.4" y1="34.3" x2="25.8" y2="40.2" />
  <line x1="28.3" y1="32" x2="22" y2="32" />
  <line x1="29.4" y1="29.7" x2="25.8" y2="23.8" />
  <!-- Long solar rays (8 primary) -->
  <line x1="32" y1="20" x2="32" y2="8" />
  <line x1="40.5" y1="23.5" x2="48.5" y2="15.5" />
  <line x1="44" y1="32" x2="56" y2="32" />
  <line x1="40.5" y1="40.5" x2="48.5" y2="48.5" />
  <line x1="32" y1="44" x2="32" y2="56" />
  <line x1="23.5" y1="40.5" x2="15.5" y2="48.5" />
  <line x1="20" y1="32" x2="8" y2="32" />
  <line x1="23.5" y1="23.5" x2="15.5" y2="15.5" />
  <!-- Small diamond tip on each long ray -->
  <line x1="32" y1="8" x2="30.5" y2="11" />
  <line x1="32" y1="8" x2="33.5" y2="11" />
  <line x1="56" y1="32" x2="53" y2="30.5" />
  <line x1="56" y1="32" x2="53" y2="33.5" />
  <line x1="32" y1="56" x2="30.5" y2="53" />
  <line x1="32" y1="56" x2="33.5" y2="53" />
  <line x1="8" y1="32" x2="11" y2="30.5" />
  <line x1="8" y1="32" x2="11" y2="33.5" />
</svg>
