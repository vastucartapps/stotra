<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Lion's face (courageous) -->
  <!-- Mane (radiating lines around head) -->
  <path d="M32 10 L30 6 M32 10 L34 6"/>
  <path d="M22 13 L18 10 M42 13 L46 10"/>
  <path d="M16 20 L12 18 M48 20 L52 18"/>
  <path d="M14 30 L10 30 M50 30 L54 30"/>
  <path d="M16 40 L12 42 M48 40 L52 42"/>
  <path d="M22 47 L20 51 M42 47 L44 51"/>
  <!-- Mane arc -->
  <path d="M20 14 Q10 24 12 36 Q14 46 24 50 Q32 54 40 50 Q50 46 52 36 Q54 24 44 14 Q38 10 32 10 Q26 10 20 14 Z"/>
  <!-- Face circle -->
  <circle cx="32" cy="32" r="14"/>
  <!-- Eyes (fierce/brave) -->
  <ellipse cx="26" cy="28" rx="3" ry="2.5"/>
  <ellipse cx="38" cy="28" rx="3" ry="2.5"/>
  <!-- Pupils -->
  <circle cx="26" cy="28" r="1.2" stroke="none" fill="currentColor"/>
  <circle cx="38" cy="28" r="1.2" stroke="none" fill="currentColor"/>
  <!-- Nose -->
  <path d="M30 33 Q32 35 34 33"/>
  <circle cx="32" cy="33" r="2"/>
  <!-- Mouth (open roar) -->
  <path d="M25 38 Q28 42 32 43 Q36 42 39 38"/>
  <!-- Whisker lines -->
  <line x1="18" y1="35" x2="26" y2="34" stroke-width="1"/>
  <line x1="18" y1="38" x2="26" y2="36" stroke-width="1"/>
  <line x1="38" y1="34" x2="46" y2="35" stroke-width="1"/>
  <line x1="38" y1="36" x2="46" y2="38" stroke-width="1"/>
  <!-- Darkness/shadow breaking away (bottom) -->
  <path d="M20 54 Q24 58 32 58 Q40 58 44 54" stroke-dasharray="3,2" stroke-width="1"/>
</svg>
