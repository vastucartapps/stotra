<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Balance beam (slightly tipped left = winning) -->
  <line x1="16" y1="22" x2="48" y2="26"/>
  <!-- Central pivot pillar -->
  <line x1="32" y1="8" x2="32" y2="24"/>
  <circle cx="32" cy="24" r="2"/>
  <!-- Left scale pan (higher = winner) -->
  <path d="M10 22 Q16 22 22 22"/>
  <path d="M10 22 Q12 30 16 30 Q20 30 22 22"/>
  <!-- Right scale pan (lower) -->
  <path d="M42 26 Q48 26 54 26"/>
  <path d="M42 26 Q44 34 48 34 Q52 34 54 26"/>
  <!-- Winning checkmark in left pan -->
  <path d="M13 26 L15.5 28.5 L19 24"/>
  <!-- Gavel -->
  <line x1="38" y1="44" x2="52" y2="58"/>
  <!-- Gavel head -->
  <rect x="32" y="38" width="12" height="8" rx="2" transform="rotate(-45 38 42)"/>
  <!-- Base/podium line -->
  <line x1="14" y1="56" x2="50" y2="56"/>
  <!-- Pillar base decoration -->
  <line x1="28" y1="54" x2="36" y2="54"/>
  <line x1="26" y1="56" x2="38" y2="56"/>
</svg>
