<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- House floor plan outline -->
  <rect x="10" y="16" width="44" height="38" rx="1"/>
  <!-- Roof peak -->
  <path d="M10 16 L32 6 L54 16"/>
  <!-- Interior room divisions -->
  <line x1="32" y1="16" x2="32" y2="54"/>
  <line x1="10" y1="35" x2="54" y2="35"/>
  <!-- Door opening -->
  <path d="M25 54 L25 44 Q32 44 32 54" stroke-width="1.2"/>
  <!-- Compass rose in center (directional arrows) -->
  <circle cx="32" cy="25" r="6"/>
  <!-- N arrow (up) -->
  <path d="M32 19 L30.5 23 L32 22 L33.5 23 Z" stroke-width="1"/>
  <!-- S arrow (down) -->
  <path d="M32 31 L30.5 27 L32 28 L33.5 27 Z" stroke-width="1"/>
  <!-- E arrow (right) -->
  <path d="M38 25 L34 23.5 L35 25 L34 26.5 Z" stroke-width="1"/>
  <!-- W arrow (left) -->
  <path d="M26 25 L30 23.5 L29 25 L30 26.5 Z" stroke-width="1"/>
  <!-- Dosh warning mark (cross on lower right room) -->
  <line x1="38" y1="40" x2="48" y2="50" stroke-width="1.2"/>
  <line x1="48" y1="40" x2="38" y2="50" stroke-width="1.2"/>
</svg>
