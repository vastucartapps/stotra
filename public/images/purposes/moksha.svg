<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- The cycle of samsara - circle below -->
  <circle cx="32" cy="46" r="12" stroke-width="1.5"/>
  <!-- Break in circle at top (soul escaping samsara) -->
  <!-- We draw the circle except at the very top gap -->
  <!-- Re-draw as arc with gap: two arcs -->
  <!-- Left arc - bottom half and left -->
  <!-- The gap is at top: from ~340deg to 20deg, so we draw from 20deg to 340deg -->
  <!-- Using path: starting right side going clockwise around bottom to left -->
  <!-- Actually done with the full circle, add gap marks -->
  <!-- Breaking point marks -->
  <path d="M28 35 L26 33" stroke-width="1.2"/>
  <path d="M36 35 L38 33" stroke-width="1.2"/>
  <!-- Soul as flame rising upward through the gap -->
  <!-- Flame body -->
  <path d="M32 32 C31 27 29 23 30 18 C31 14 32 12 32 12 C32 12 33 14 34 18 C35 23 33 27 32 32Z"/>
  <!-- Inner flame -->
  <path d="M32 30 C31.5 26 30.5 23 31 19 C31.5 17 32 15 32 15 C32 15 32.5 17 33 19 C33.5 23 32.5 26 32 30Z" stroke-width="1"/>
  <!-- Rising motion lines beside flame -->
  <path d="M28 26 L25 20" stroke-width="1" stroke-dasharray="1.5 2"/>
  <path d="M36 26 L39 20" stroke-width="1" stroke-dasharray="1.5 2"/>
  <!-- Divine light / liberation radiance at top -->
  <circle cx="32" cy="8" r="4" stroke-width="1.2"/>
  <path d="M32 3 L32 1" stroke-width="1"/>
  <path d="M27 5 L25 3" stroke-width="1"/>
  <path d="M37 5 L39 3" stroke-width="1"/>
  <path d="M25 8 L22 8" stroke-width="1"/>
  <path d="M39 8 L42 8" stroke-width="1"/>
  <path d="M27 11 L25 13" stroke-width="1"/>
  <path d="M37 11 L39 13" stroke-width="1"/>
  <!-- Dots on samsara circle suggesting souls still trapped -->
  <circle cx="32" cy="58" r="1.2" fill="currentColor" stroke="none"/>
  <circle cx="21" cy="55" r="1" fill="currentColor" stroke="none"/>
  <circle cx="43" cy="55" r="1" fill="currentColor" stroke="none"/>
  <circle cx="20" cy="46" r="1" fill="currentColor" stroke="none"/>
  <circle cx="44" cy="46" r="1" fill="currentColor" stroke="none"/>
</svg>
