<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Broken chain - left side links -->
  <rect x="6" y="22" width="12" height="8" rx="4"/>
  <rect x="16" y="18" width="8" height="12" rx="4"/>
  <!-- Break gap in center -->
  <line x1="24" y1="24" x2="27" y2="21"/>
  <line x1="27" y1="24" x2="30" y2="21"/>
  <!-- Chain right side -->
  <rect x="34" y="18" width="8" height="12" rx="4"/>
  <rect x="40" y="22" width="12" height="8" rx="4"/>
  <!-- Break marks (jagged) -->
  <path d="M24 22 L26 26 L29 20 L31 24" stroke-width="1.5"/>
  <!-- Coins falling free -->
  <circle cx="28" cy="38" r="5"/>
  <line x1="25" y1="38" x2="31" y2="38"/>
  <line x1="28" y1="35" x2="28" y2="41"/>
  <circle cx="40" cy="44" r="4"/>
  <line x1="37.5" y1="44" x2="42.5" y2="44"/>
  <line x1="40" y1="41.5" x2="40" y2="46.5"/>
  <circle cx="18" cy="46" r="3.5"/>
  <line x1="15.5" y1="46" x2="20.5" y2="46"/>
  <!-- Freedom sparkles -->
  <path d="M48 30 L49 27 L50 30 L53 31 L50 32 L49 35 L48 32 L45 31 Z"/>
  <path d="M10 38 L11 36 L12 38 L14 39 L12 40 L11 42 L10 40 L8 39 Z"/>
</svg>
