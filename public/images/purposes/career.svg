<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Rising steps / stairs ascending from bottom-left to top-right -->
  <!-- Ground/base line -->
  <path d="M8 56 L8 48 L20 48 L20 40 L32 40 L32 32 L44 32 L44 24 L56 24"/>
  <!-- Step verticals and horizontals drawn as solid staircase -->
  <path d="M8 56 L20 56 L20 48 L32 48 L32 40 L44 40 L44 32 L56 32 L56 24"/>
  <!-- Flag pole at the top -->
  <path d="M56 24 L56 8"/>
  <!-- Flag waving at top -->
  <path d="M56 8 C60 9 62 12 60 14 C58 16 56 15 56 14"/>
  <!-- Star above flag -->
  <path d="M56 5 L57.2 4 L56 3 L54.8 4 Z"/>
  <path d="M54.5 4.5 L57.5 4.5 M56 3 L56 6" stroke-width="1"/>
  <!-- Small person/figure at top step -->
  <circle cx="50" cy="22" r="3" stroke-width="1.2"/>
  <path d="M50 25 L50 31" stroke-width="1.2"/>
  <path d="M47 28 L53 28" stroke-width="1.2"/>
  <path d="M50 31 L47 36 M50 31 L53 36" stroke-width="1.2"/>
  <!-- Rising arrow to suggest upward trajectory -->
  <path d="M14 44 L20 38 L26 34" stroke-width="1" stroke-dasharray="2 2"/>
  <path d="M23 33 L26 34 L25 37" stroke-width="1"/>
</svg>
