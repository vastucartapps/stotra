<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Saturn-like planet (circle with ring) -->
  <circle cx="32" cy="32" r="12"/>
  <!-- Planetary ring (elliptical, tilted) -->
  <ellipse cx="32" cy="32" rx="22" ry="7" transform="rotate(-20 32 32)"/>
  <!-- Surface details / lines on planet -->
  <path d="M22 28 C26 26 38 26 42 28" stroke-width="1"/>
  <path d="M21 32 C25 30 39 30 43 32" stroke-width="1"/>
  <path d="M22 36 C26 38 38 38 42 36" stroke-width="1"/>
  <!-- Protective yantra circle around everything -->
  <circle cx="32" cy="32" r="28" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- Yantra / protective geometry - 4 cardinal marks -->
  <path d="M32 4 L30 8 L32 7 L34 8 Z" stroke-width="1"/>
  <path d="M32 60 L30 56 L32 57 L34 56 Z" stroke-width="1"/>
  <path d="M4 32 L8 30 L7 32 L8 34 Z" stroke-width="1"/>
  <path d="M60 32 L56 30 L57 32 L56 34 Z" stroke-width="1"/>
  <!-- Diagonal protective marks -->
  <path d="M11 11 L14 13" stroke-width="1"/>
  <path d="M53 11 L50 13" stroke-width="1"/>
  <path d="M11 53 L14 51" stroke-width="1"/>
  <path d="M53 53 L50 51" stroke-width="1"/>
  <!-- Center dot on planet -->
  <circle cx="32" cy="32" r="2" fill="currentColor" stroke="none"/>
</svg>
