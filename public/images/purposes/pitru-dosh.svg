<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Ancestral tree trunk -->
  <line x1="32" y1="58" x2="32" y2="36"/>
  <!-- Main branches -->
  <path d="M32 44 Q22 38 14 30"/>
  <path d="M32 44 Q42 38 50 30"/>
  <path d="M32 40 Q26 34 20 28"/>
  <path d="M32 40 Q38 34 44 28"/>
  <!-- Ancestors at branch tips (circles = souls) -->
  <circle cx="14" cy="28" r="3"/>
  <circle cx="50" cy="28" r="3"/>
  <circle cx="20" cy="26" r="2.5"/>
  <circle cx="44" cy="26" r="2.5"/>
  <circle cx="32" cy="22" r="3"/>
  <!-- Sub-branches to grandparents -->
  <path d="M14 28 Q12 22 10 18"/>
  <path d="M50 28 Q52 22 54 18"/>
  <circle cx="10" cy="16" r="2"/>
  <circle cx="54" cy="16" r="2"/>
  <!-- Tarpan offering hands (cupped, with water drops) -->
  <!-- Left hand -->
  <path d="M20 52 Q22 48 28 48 L28 54 Q24 56 20 52 Z"/>
  <!-- Right hand -->
  <path d="M44 52 Q42 48 36 48 L36 54 Q40 56 44 52 Z"/>
  <!-- Water drops (tarpan) falling -->
  <path d="M28 48 Q30 44 32 42 Q34 44 36 48"/>
  <circle cx="30" cy="44" r="1" stroke="none" fill="currentColor"/>
  <circle cx="34" cy="44" r="1" stroke="none" fill="currentColor"/>
  <circle cx="32" cy="41" r="1" stroke="none" fill="currentColor"/>
  <!-- Ground line -->
  <line x1="16" y1="58" x2="48" y2="58"/>
  <!-- Roots -->
  <path d="M32 58 Q28 60 24 62" stroke-width="1"/>
  <path d="M32 58 Q36 60 40 62" stroke-width="1"/>
</svg>
